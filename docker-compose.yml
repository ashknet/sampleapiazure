version: '3.8'

services:
  # SQL Server
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: emr-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong@Passw0rd
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - emr-network

  # Azurite (Local Azure Storage Emulator)
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    container_name: emr-azurite
    ports:
      - "10000:10000" # Blob service
      - "10001:10001" # Queue service
      - "10002:10002" # Table service
    volumes:
      - azurite-data:/data
    networks:
      - emr-network

  # API
  api:
    build:
      context: ./src/api
      dockerfile: Emr.Api/Dockerfile
    container_name: emr-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=https://+:443;http://+:80
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=EmrDb;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True
      - ConnectionStrings__AzureStorage=DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;
      - UseInMemoryDatabase=false
      - ASPNETCORE_Kestrel__Certificates__Default__Password=password
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/aspnetapp.pfx
    ports:
      - "5000:80"
      - "5001:443"
    depends_on:
      - sqlserver
      - azurite
    volumes:
      - ~/.aspnet/https:/https:ro
    networks:
      - emr-network

  # Web App
  web:
    build:
      context: ./src/web
      dockerfile: Dockerfile
    container_name: emr-web
    environment:
      - VITE_API_URL=https://localhost:5001
      - VITE_B2C_CLIENT_ID=${B2C_CLIENT_ID}
      - VITE_B2C_AUTHORITY=${B2C_AUTHORITY}
      - VITE_B2C_KNOWN_AUTHORITY=${B2C_KNOWN_AUTHORITY}
      - VITE_API_SCOPE=${API_SCOPE}
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - emr-network

volumes:
  sqlserver-data:
  azurite-data:

networks:
  emr-network:
    driver: bridge