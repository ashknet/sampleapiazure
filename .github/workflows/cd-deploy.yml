name: CD - Deploy to Azure

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - test
          - prod

env:
  AZURE_WEBAPP_PACKAGE_PATH: './src/api/Emr.Api'
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION: '18.x'

jobs:
  determine-environment:
    name: Determine Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
    steps:
    - id: set-env
      run: |
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
        elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
          echo "environment=prod" >> $GITHUB_OUTPUT
        else
          echo "environment=dev" >> $GITHUB_OUTPUT
        fi

  deploy-infrastructure:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: determine-environment
    environment: ${{ needs.determine-environment.outputs.environment }}
    outputs:
      api-app-name: ${{ steps.deploy.outputs.apiAppServiceName }}
      static-web-url: ${{ steps.deploy.outputs.staticWebAppUrl }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Login to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    
    - name: Deploy Bicep
      id: deploy
      uses: azure/arm-deploy@v1
      with:
        scope: subscription
        region: eastus
        template: ./infra/main.bicep
        parameters: ./infra/parameters.${{ needs.determine-environment.outputs.environment }}.json sqlAdminPassword=${{ secrets.SQL_ADMIN_PASSWORD }}
        deploymentName: emr-${{ needs.determine-environment.outputs.environment }}-${{ github.run_number }}

  deploy-backend:
    name: Deploy Backend API
    runs-on: ubuntu-latest
    needs: [determine-environment, deploy-infrastructure]
    environment: ${{ needs.determine-environment.outputs.environment }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: Build and publish
      run: |
        dotnet restore
        dotnet build --configuration Release
        dotnet publish -c Release -o ./publish
      working-directory: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}
    
    - name: Login to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    
    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ needs.deploy-infrastructure.outputs.api-app-name }}
        package: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}/publish
    
    - name: Run EF Core migrations
      run: |
        dotnet tool install --global dotnet-ef
        CONNECTION_STRING=$(az webapp config connection-string list --name ${{ needs.deploy-infrastructure.outputs.api-app-name }} --resource-group rg-emr-${{ needs.determine-environment.outputs.environment }} --query "[?name=='DefaultConnection'].value" -o tsv)
        dotnet ef database update --connection "$CONNECTION_STRING" --project ./src/api/Emr.Infrastructure --startup-project ./src/api/Emr.Api

  deploy-web:
    name: Deploy Web App
    runs-on: ubuntu-latest
    needs: [determine-environment, deploy-infrastructure]
    environment: ${{ needs.determine-environment.outputs.environment }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: ${{ env.NODE_VERSION }}
    
    - name: Build web app
      run: |
        npm ci
        npm run build
      working-directory: ./src/web
      env:
        VITE_API_URL: https://${{ needs.deploy-infrastructure.outputs.api-app-name }}.azurewebsites.net
        VITE_B2C_CLIENT_ID: ${{ secrets.B2C_CLIENT_ID }}
        VITE_B2C_AUTHORITY: ${{ secrets.B2C_AUTHORITY }}
        VITE_B2C_KNOWN_AUTHORITY: ${{ secrets.B2C_KNOWN_AUTHORITY }}
        VITE_API_SCOPE: ${{ secrets.API_SCOPE }}
    
    - name: Deploy to Static Web App
      uses: Azure/static-web-apps-deploy@v1
      with:
        azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        action: "upload"
        app_location: "/src/web"
        output_location: "dist"
        skip_app_build: true

  deploy-mobile:
    name: Deploy Mobile App
    runs-on: ubuntu-latest
    needs: [determine-environment, deploy-infrastructure]
    environment: ${{ needs.determine-environment.outputs.environment }}
    if: needs.determine-environment.outputs.environment == 'prod'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: ${{ env.NODE_VERSION }}
    
    - name: Setup Expo
      uses: expo/expo-github-action@v8
      with:
        expo-version: latest
        token: ${{ secrets.EXPO_TOKEN }}
        eas-version: latest
    
    - name: Install dependencies
      run: npm ci
      working-directory: ./src/mobile
    
    - name: Build and submit to stores
      run: |
        eas build --platform all --non-interactive
        eas submit --platform all --non-interactive
      working-directory: ./src/mobile
      env:
        EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  integration-tests:
    name: Run Integration Tests
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-web]
    environment: ${{ needs.determine-environment.outputs.environment }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Run API integration tests
      run: |
        npm ci
        npm run test:integration
      working-directory: ./tests/api
      env:
        API_URL: https://${{ needs.deploy-infrastructure.outputs.api-app-name }}.azurewebsites.net
        TEST_CLIENT_ID: ${{ secrets.TEST_CLIENT_ID }}
        TEST_CLIENT_SECRET: ${{ secrets.TEST_CLIENT_SECRET }}
    
    - name: Run E2E tests
      uses: microsoft/playwright-github-action@v1
      with:
        working-directory: ./tests/web
        command: npm run test:e2e
      env:
        WEB_URL: https://${{ needs.deploy-infrastructure.outputs.static-web-url }}
        API_URL: https://${{ needs.deploy-infrastructure.outputs.api-app-name }}.azurewebsites.net