name: CI - Web App

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'src/web/**'
      - '.github/workflows/ci-web.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'src/web/**'
      - '.github/workflows/ci-web.yml'

env:
  NODE_VERSION: '18.x'
  PROJECT_PATH: './src/web'

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: ${{ env.PROJECT_PATH }}/package-lock.json
    
    - name: Install dependencies
      run: npm ci
      working-directory: ${{ env.PROJECT_PATH }}
    
    - name: Run linting
      run: npm run lint
      working-directory: ${{ env.PROJECT_PATH }}
    
    - name: Run type checking
      run: npm run type-check || npx tsc --noEmit
      working-directory: ${{ env.PROJECT_PATH }}
    
    - name: Run tests
      run: npm test -- --coverage --watchAll=false
      working-directory: ${{ env.PROJECT_PATH }}
      env:
        CI: true
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        directory: ${{ env.PROJECT_PATH }}/coverage
        flags: web
        name: web-coverage
    
    - name: Build application
      run: npm run build
      working-directory: ${{ env.PROJECT_PATH }}
      env:
        VITE_API_URL: ${{ secrets.API_URL }}
        VITE_B2C_CLIENT_ID: ${{ secrets.B2C_CLIENT_ID }}
        VITE_B2C_AUTHORITY: ${{ secrets.B2C_AUTHORITY }}
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: web-build
        path: ${{ env.PROJECT_PATH }}/dist
        retention-days: 5

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Run npm audit
      run: npm audit --production --audit-level=moderate
      working-directory: ${{ env.PROJECT_PATH }}
      continue-on-error: true
    
    - name: Run Snyk security scan
      uses: snyk/actions/node@master
      with:
        args: --severity-threshold=high --file=${{ env.PROJECT_PATH }}/package.json
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      continue-on-error: true

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: build-and-test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Download build artifacts
      uses: actions/download-artifact@v3
      with:
        name: web-build
        path: ${{ env.PROJECT_PATH }}/dist
    
    - name: Run Lighthouse CI
      uses: treosh/lighthouse-ci-action@v9
      with:
        configPath: ${{ env.PROJECT_PATH }}/.lighthouserc.json
        uploadArtifacts: true
        temporaryPublicStorage: true